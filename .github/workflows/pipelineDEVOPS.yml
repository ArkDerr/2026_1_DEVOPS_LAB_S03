name: Deploy HTML to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/2026_1_devops_lab_s03:latest .

      - name: Subir imagen a Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/2026_1_devops_lab_s03:latest

      - name: Conectarse a EC2 y desplegar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/2026_1_devops_lab_s03:latest
            docker stop 2026_1_devops_lab_s03 || true
            docker rm 2026_1_devops_lab_s03 || true
            docker run -d --name 2026_1_devops_lab_s03 -p 80:80 ${{ secrets.DOCKER_USERNAME }}/2026_1_devops_lab_s03:latest